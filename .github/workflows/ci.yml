name: CI

# Quality gates that keep the site secure, privacy-compliant and fast.
# Runs on every push to main and every pull request.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-audit:
    name: Build · security audit · size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Dependency security audit (fail on high or critical)
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
      - name: Performance budget
        run: node scripts/size-budget.mjs

  privacy-guard:
    name: Privacy-compliance guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Guard against undisclosed tracking / cookies / storage
        run: node scripts/privacy-guard.mjs
